name: Deploy to Live Site

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed so FTP action can detect changed files

      - name: Deploy changed files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: s96.lon.krystal.io
          port: 21
          username: agent@davenhamscouts.org.uk
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./
          local-dir: ./
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            website-core/**
            tmp/**
            CLAUDE.md
            design.md
            homepage-builder-example.html
            **/.DS_Store
